name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild -project ValoShop.xcodeproj \
            -scheme ValoShop \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/ValoShop.app Payload/
          zip -r ValoShop.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ValoShop-ipa
          path: ValoShop.ipa
